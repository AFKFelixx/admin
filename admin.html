        body.dark-mode .sticky-header.scrolled { background: rgba(45,55,72,0.98) !important; }

        .news-hover-card:hover { transform: translateY(-4px); box-shadow: 0 20px 30px -10px rgba(0,0,0,0.2); }
        .play-icon-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.6); border-radius: 50%; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.5rem; transition: background 0.2s; cursor: pointer; }
        .play-icon-overlay:hover { background: #2e5fa7; }
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
        }
        .bento-item {
            position: relative;
            overflow: hidden;
            border-radius: 1rem;
            aspect-ratio: 1 / 1;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .bento-item:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
        }
        .bento-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .bento-item:hover img {
            transform: scale(1.1);
        }
        .bento-item.large {
            grid-column: span 2;
            grid-row: span 2;
            aspect-ratio: 2 / 2;
        }
        .bento-item.wide {
            grid-column: span 2;
            aspect-ratio: 2 / 1;
        }
        .bento-item.tall {
            grid-row: span 2;
            aspect-ratio: 1 / 2;
        }

        @media (max-width: 640px) {
            .bento-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .bento-item.large {
                grid-column: span 2;
                grid-row: span 1;
                aspect-ratio: 2 / 1;
            }
            .bento-item.tall {
                grid-row: span 1;
                aspect-ratio: 1 / 1;
            }
            .bento-item.wide {
                grid-column: span 2;
                aspect-ratio: 2 / 1;
            }

        .news-hover-card .text-3xl.font-bold {
            font-size: 1.2rem;
            line-height: 2.25rem;
        }
        .video-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .video-modal.active {
            visibility: visible;
            opacity: 1;
        }
        .video-modal-content {
            position: relative;
            width: 90%;
            max-width: 960px;
            background: #000;
            border-radius: 1rem;
            overflow: hidden;
        }
        .video-modal video {
            width: 100%;
            height: auto;
            display: block;
        }
        .video-modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;

            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;

        .video-modal-close:hover {
            background: rgba(255,255,255,0.4);
        }

        .disclosure-category { margin-bottom: 1.25rem; border: 1px solid #e2e8f0; border-radius: 1rem; background: white; overflow: hidden; }

        .disclosure-category[open] summary::after { transform: rotate(180deg); }
        .year-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 1rem; padding: 1.5rem; }
        .year-item { background: #f8fafc; border-radius: 0.75rem; padding: 0.75rem 1rem; border-left: 4px solid #2e5fa7; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 1000; visibility: hidden; opacity: 0; transition: opacity 0.3s ease; }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal-content { background: white; border-radius: 2rem; max-width: 800px; width: 90%; max-height: 80vh; overflow-y: auto; padding: 2rem; position: relative; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .modal-close { position: absolute; top: 1rem; right: 1rem; background: #f1f5f9; border: none; width: 2.5rem; height: 2.5rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .modal-close:hover { background: #e2e8f0; }
        .tab-buttons { display: flex; gap: 1rem; margin: 1.5rem 0 1rem; border-bottom: 2px solid #e2e8f0; flex-wrap: wrap; }
        .tab-btn { padding: 0.5rem 1rem; font-weight: 600; color: #4b5563; cursor: pointer; border-bottom: 3px solid transparent; transition: 0.2s; }
        .tab-btn.active { color: #2e5fa7; border-bottom-color: #2e5fa7; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }
        .official-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px,1fr)); gap: 1rem; }
        .official-item { background: #f8fafc; padding: 0.75rem 1rem; border-radius: 0.75rem; border-left: 4px solid #2e5fa7; }
        .close-btn { position: absolute; top: 1rem; right: 1rem; background: white; border: none; width: 2.5rem; height: 2.5rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; transition: all 0.2s; }
        .close-btn:hover { background: #f1f5f9; transform: scale(1.05); }
        .historical-content p { margin-bottom: 1rem; line-height: 1.7; }
        .profile-text p { margin-bottom: 1rem; line-height: 1.7; }

        /* Floating sticky social sidebar */
        .social-sidebar {
            position: fixed;
            top: 50%;
            right: 0;
            transform: translateY(-50%);
            z-index: 60;
            display: flex;
            flex-direction: column;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);

            border: 1px solid rgba(255,255,255,0.3);

            padding: 0.9rem 1rem;

            color: #2e5fa7;

            .social-sidebar {

        .slider-slide {

        /* Mobile font adjustments */
        @media (max-width: 768px) {
            #siteNameText {
                font-size: 1.2rem;
            }
            .theme-toggle {
                font-size: 1.2rem;
            }
            /* Hide date/time on mobile */
            #headerDateTime {
                display: none;
            }
        }
        /* Mobile drawer overlay and panel styles - updated for dark mode */
        #mobileDrawerOverlay {
            position: fixed;
            inset: 0;
            background-color: rgba(0,0,0,0.4); /* dimming only, no blur */
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s ease, visibility 0.3s;
        }
        #mobileDrawerOverlay.active {
            visibility: visible;
            opacity: 1;
        }
        #mobileDrawerPanel {
            position: absolute;
            top: 0;
            right: 0;
            height: 100%;
            width: 280px;
            max-width: 80%;
            background: #ffffff; /* white background */
            color: #000000; /* black text */
            box-shadow: -5px 0 25px rgba(0,0,0,0.2);
            transform: translateX(100%);
            transition: transform 0.3s ease-in-out;
            overflow-y: auto;
            padding: 1.5rem 1rem;
        }
        #mobileDrawerOverlay.active #mobileDrawerPanel {
            transform: translateX(0);
        }

        /* Mobile drawer link styles - base white bg, black text */
        #mobileDrawerPanel nav a,
        #mobileDrawerPanel .dropdown-parent {
            color: #000000;
            text-decoration: none;
            display: block;
            padding: 0.5rem 0;
            font-weight: 500;
            transition: none;
        }
        #mobileDrawerPanel nav .dropdown-parent {
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #mobileDrawerPanel nav .dropdown-parent i {
            transition: transform 0.2s;
            color: #000000;
        }
        #mobileDrawerPanel nav .submenu {
            padding-left: 1rem;
            margin: 0.25rem 0 0.5rem 0;
            display: none;
        }
        #mobileDrawerPanel nav .submenu.open {
            display: block;
        }
        #mobileDrawerPanel nav .submenu a {
            padding: 0.4rem 0;
            font-weight: 400;
        }
        /* no hover effect intentionally */
        #mobileDrawerPanel nav a:hover,
        #mobileDrawerPanel .dropdown-parent:hover {
            color: #000000;
            background: transparent;
        }

        /* DARK MODE OVERRIDES FOR MOBILE DRAWER - NOW BLACK BACKGROUND, WHITE TEXT */
        body.dark-mode #mobileDrawerPanel {
            background: #000000 !important;
            color: #ffffff !important;
        }
        body.dark-mode #mobileDrawerPanel nav a,
        body.dark-mode #mobileDrawerPanel .dropdown-parent {
            color: #ffffff !important;
        }
        body.dark-mode #mobileDrawerPanel .dropdown-parent i {
            color: #ffffff !important;
        }
        body.dark-mode #mobileDrawerPanel nav .submenu a {
            color: #ffffff !important;
        }

        body.dark-mode #mobileDrawerPanel nav a:hover,
        body.dark-mode #mobileDrawerPanel .dropdown-parent:hover {
            color: #ffffff !important;
            background: #333333;
        }

        /* Loading indicator for content */
        .loading-placeholder {
            text-align: center;
            padding: 3rem;
            color: #6b7280;
            font-size: 1.2rem;
        }
    </style>

                            html += `<div class="bento-item tall"><img src="${galleryItems[1].image}" alt="Gallery"></div>`;
                            html += `<div class="bento-item"><img src="${galleryItems[2].image}" alt="Gallery"></div>`;
                            html += `<div class="bento-item wide"><img src="${galleryItems[3].image}" alt="Gallery"></div>`;
                        } else {
                            galleryItems.forEach(img => {
                                html += `<div class="bento-item"><img src="${img.image}" alt="Gallery"></div>`;
                            });
                        }
                        html += `</div>`;
                        html += `<a href="gallery.html" class="text-[#2e5fa7] font-medium hover:underline mt-2 inline-block">View more</a>`;
                        html += `</div>`;
                    }
                    html += `</div>`;
                }

                if (basketballItems.length > 0) {
                    html += `<h3 class="text-2xl font-bold mt-12 mb-5">🏀 Inter Barangay Basketball News</h3>`;
                    html += `<div class="grid md:grid-cols-3 gap-6">`;
                    basketballItems.forEach(b => {
                        html += `<div class="bg-white rounded-xl shadow-md overflow-hidden news-hover-card">`;
                        html += `<img src="${b.image}" class="h-40 w-full object-cover">`;
                        html += `<div class="p-4">`;
                        html += `<h4 class="font-bold">${b.title}</h4>`;
                        html += `<div class="flex items-center text-xs text-gray-500 mt-2">`;
                        html += `<i class="fas fa-user mr-1"></i> ${b.author || ''} · `;
                        html += `<a href="${b.link}" class="text-[#2e5fa7] font-medium hover:underline ml-1">Read more</a>`;
                        html += `</div></div></div>`;
                    });
                    html += `</div>`;
                }

                if (html === '') {
                    html = '<p class="text-center text-gray-500 py-8">No news available at the moment.</p>';
                }

                container.innerHTML = html;

                // Attach video play buttons
                document.querySelectorAll('.video-play-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const src = btn.dataset.videoSrc;
                        window.playVideo(src);
                    });
                });
            }
            renderNews();

            // ---------- Video Modal (same as before) ----------
            const modal = document.getElementById('videoModal');
            const closeBtn = document.getElementById('closeVideoModal');
            const modalVideo = document.getElementById('modalVideo');
            const modalIframe = document.getElementById('modalIframe');

            function closeModal() {
                modal.classList.remove('active');
                modalVideo.pause();
                modalVideo.src = '';
                modalIframe.src = '';
                modalVideo.style.display = 'none';
                modalIframe.style.display = 'none';
            }

            if (closeBtn) closeBtn.addEventListener('click', closeModal);
            if (modal) modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

            window.playVideo = function(src) {
                if (!src) { alert('No video source set for this item.'); return; }

                const ytRegex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i;
                const match = src.match(ytRegex);

                if (match) {
                    const videoId = match[1];
                    const embedUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1`;
                    modalIframe.src = embedUrl;
                    modalVideo.style.display = 'none';
                    modalIframe.style.display = 'block';
                } else {
                    modalVideo.src = src;
                    modalVideo.load();
                    modalVideo.style.display = 'block';
                    modalIframe.style.display = 'none';
                }
                
                modal.classList.add('active');
                
                if (!match) {
                    modalVideo.play().catch(e => console.log('Autoplay prevented:', e));
                }
            };

            // ---------- Mobile Hamburger Menu (unchanged) ----------
            const hamburger = document.getElementById('hamburgerBtn');
            const overlay = document.getElementById('mobileDrawerOverlay');
            const panel = document.getElementById('mobileDrawerPanel');

            if (hamburger && overlay) {
                hamburger.addEventListener('click', (e) => {
                    e.stopPropagation();
                    overlay.classList.add('active');
                    document.body.style.overflow = 'hidden';
                });

                overlay.addEventListener('click', (e) => {
                    if (e.target === overlay) {
                        overlay.classList.remove('active');
                        document.body.style.overflow = '';
                    }
                });

                panel.querySelectorAll('a').forEach(link => {
                    link.addEventListener('click', () => {
                        overlay.classList.remove('active');
                        document.body.style.overflow = '';
                    });
                });

                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape' && overlay.classList.contains('active')) {
                        overlay.classList.remove('active');
                        document.body.style.overflow = '';
                    }
                });
            }

            // ---------- Dropdown toggles for mobile menu ----------
            function initMobileDropdowns() {
                const dropdownParents = document.querySelectorAll('#mobileDrawerPanel .dropdown-parent');
                dropdownParents.forEach(parent => {
                    parent.addEventListener('click', function(e) {
                        e.preventDefault();
                        const targetId = this.dataset.target;
                        const submenu = document.getElementById(targetId);
                        if (submenu) {
                            submenu.classList.toggle('open');
                            const icon = this.querySelector('i');
                            if (icon) {
                                icon.style.transform = submenu.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)';
                            }
                        }
                    });
                });
            }
            initMobileDropdowns();

            // ---------- Sticky Header Shadow ----------
            function initHeaderScroll() {
                const header = document.getElementById('mainHeader');
                const scrollHandler = () => header.classList.toggle('scrolled', window.scrollY > 20);
                window.removeEventListener('scroll', scrollHandler);
                window.addEventListener('scroll', scrollHandler);
            }
            initHeaderScroll();

            // ---------- Smooth Scroll for anchor links ----------
            function initSmoothScroll() {
                document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                    anchor.removeEventListener('click', smoothScroll);
                    anchor.addEventListener('click', smoothScroll);
                });
                function smoothScroll(e) {
                    const href = this.getAttribute('href');
                    if (href === "#") return;
                    const target = document.querySelector(href);
                    if (target) {
                        e.preventDefault();
                        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                }
            }
            initSmoothScroll();

            // ---------- Search function: redirect to search.html ----------
            function performSearch(inputElement) {
                const query = inputElement.value.trim();
                if (query) {
                    window.location.href = `search.html?q=${encodeURIComponent(query)}`;
                }
            }

            // Desktop search
            const desktopSearchInput = document.getElementById('desktopSearchInput');
            const desktopSearchButton = document.querySelector('.desktop-search-btn');
            if (desktopSearchInput && desktopSearchButton) {
                desktopSearchButton.addEventListener('click', () => performSearch(desktopSearchInput));
                desktopSearchInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        performSearch(desktopSearchInput);
                    }
                });
            }

            // Mobile search
            const mobileSearchInput = document.getElementById('mobileSearchInput');
            const mobileSearchButton = document.getElementById('mobileSearchBtn');
            if (mobileSearchInput && mobileSearchButton) {
                mobileSearchButton.addEventListener('click', () => performSearch(mobileSearchInput));
                mobileSearchInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        performSearch(mobileSearchInput);
                    }
                });
            }

            // Modal functionality (directory) – unchanged
            const modalDir = document.getElementById('directoryModal');
            const closeModalBtn = document.getElementById('closeModalBtn');
            const govKeyOfficials = document.getElementById('govKeyOfficials');
            if (govKeyOfficials && modalDir) {
                govKeyOfficials.addEventListener('click', (e) => {
                    e.preventDefault();
                    modalDir.classList.add('active');
                    document.body.style.overflow = 'hidden';
                });
            }
            if (closeModalBtn) {
                closeModalBtn.addEventListener('click', () => {
                    modalDir.classList.remove('active');
                    document.body.style.overflow = '';
                });
            }
            const tabElected = document.getElementById('tabElected');
            const tabDept = document.getElementById('tabDept');
            const paneElected = document.getElementById('paneElected');
            const paneDept = document.getElementById('paneDept');
            if (tabElected && tabDept) {
                tabElected.addEventListener('click', () => {
                    tabElected.classList.add('active');
                    tabDept.classList.remove('active');
                    paneElected.classList.add('active');
                    paneDept.classList.remove('active');
                });
                tabDept.addEventListener('click', () => {
                    tabDept.classList.add('active');
                    tabElected.classList.remove('active');
                    paneDept.classList.add('active');
                    paneElected.classList.remove('active');
                });
            }
            if (modalDir) {
                modalDir.addEventListener('click', (e) => {
                    if (e.target === modalDir) {
                        modalDir.classList.remove('active');
                        document.body.style.overflow = '';
                    }
                });
            }
        })();
    </script>
</body>
</html>
