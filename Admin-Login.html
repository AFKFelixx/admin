<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login · Municipality of Tobias Fornier</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @layer base { * { font-family: 'Inter', system-ui, sans-serif; } }
        body.dark-mode { background-color: #0b1120; color: #e2e8f0; }
        body.dark-mode .bg-white { background-color: #1e293b !important; border-color: #334155; color: #f1f5f9; }
        body.dark-mode input { background-color: #334155; border-color: #475569; color: white; }
        body.dark-mode input::placeholder { color: #94a3b8; }
        body.dark-mode .text-gray-600 { color: #cbd5e1; }
        .theme-toggle {
            background: transparent; border: none; cursor: pointer; font-size: 1.4rem;
            color: #2e5fa7; transition: transform 0.2s; position: absolute; top: 1rem; right: 1rem;
        }
        .theme-toggle:hover { transform: scale(1.1); color: #1d3a6d; }
        body.dark-mode .theme-toggle { color: #fbbf24; }
        .error-message { color: #b91c1c; font-size: 0.875rem; margin-top: 0.5rem; text-align: center; }
        body.dark-mode .error-message { color: #f87171; }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">
    <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">
        <i class="fas fa-sun" id="themeIcon"></i>
    </button>

    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8 relative border border-gray-200/60">
        <div class="flex flex-col items-center mb-8">
            <img id="loginLogo" src="https://via.placeholder.com/80x80?text=LGU" alt="Municipality logo" class="h-20 w-20 object-contain mb-3">
            <h1 class="text-2xl font-bold text-[#2e5fa7] text-center">Municipality of<br>Tobias Fornier</h1>
            <p class="text-sm text-gray-500 mt-1">Admin Portal</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username or Email</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400"><i class="fas fa-user"></i></span>
                    <input type="text" id="username" name="username" required placeholder="admin / editor" 
                           class="w-full pl-10 pr-3 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#2e5fa7] focus:border-transparent transition">
                </div>
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400"><i class="fas fa-lock"></i></span>
                    <input type="password" id="password" name="password" required placeholder="••••••••" 
                           class="w-full pl-10 pr-3 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#2e5fa7] focus:border-transparent transition">
                </div>
            </div>

            <button type="submit" 
                    class="w-full bg-[#2e5fa7] text-white py-3 rounded-xl font-semibold text-lg hover:bg-[#1d4a8b] transition shadow-lg shadow-[#2e5fa7]/20">
                <i class="fas fa-sign-in-alt mr-2"></i> Sign in
            </button>

            <div id="loginError" class="error-message hidden"></div>
        </form>

        <div class="mt-6 text-center text-sm text-gray-500">
            <a href="index.html" class="text-[#2e5fa7] hover:underline inline-flex items-center gap-1">
                <i class="fas fa-arrow-left"></i> Back to Home
            </a>
        </div>
    </div>

    <script>
        (function() {
            // Dark mode
            const themeToggle = document.getElementById('themeToggle');
            const themeIcon = document.getElementById('themeIcon');
            const body = document.body;
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                body.classList.add('dark-mode');
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
            } else {
                themeIcon.classList.add('fa-sun');
            }
            themeToggle.addEventListener('click', () => {
                body.classList.toggle('dark-mode');
                if (body.classList.contains('dark-mode')) {
                    themeIcon.classList.remove('fa-sun');
                    themeIcon.classList.add('fa-moon');
                    localStorage.setItem('theme', 'dark');
                } else {
                    themeIcon.classList.remove('fa-moon');
                    themeIcon.classList.add('fa-sun');
                    localStorage.setItem('theme', 'light');
                }
            });

            // Load logo from CMS if available
            const logoImg = document.getElementById('loginLogo');
            try {
                const saved = localStorage.getItem('tobiasFornierCMS');
                if (saved) {
                    const data = JSON.parse(saved);
                    if (data.site && data.site.logo) logoImg.src = data.site.logo;
                }
            } catch (e) {}

            // Login validation against users stored in localStorage
            const loginForm = document.getElementById('loginForm');
            const errorDiv = document.getElementById('loginError');

            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value.trim();

                // Get users from localStorage
                let users = [];
                try {
                    const saved = localStorage.getItem('tobiasFornierCMS');
                    if (saved) {
                        const data = JSON.parse(saved);
                        users = data.users || [];
                    }
                } catch (err) {
                    console.warn('Failed to parse users', err);
                }

                // Fallback default users if none exist (first run)
                if (users.length === 0) {
                    users = [
                        { username: 'admin', email: 'admin@example.com', password: 'admin123', role: 'Administrator', status: 'Active' },
                        { username: 'editor', email: 'editor@example.com', password: 'editor123', role: 'Editor', status: 'Active' }
                    ];
                }

                const user = users.find(u => 
                    (u.username === username || u.email === username) && u.password === password && u.status === 'Active'
                );

                if (user) {
                    // Set logged-in flag
                    sessionStorage.setItem('loggedIn', 'true');
                    // Optional: store current user info
                    sessionStorage.setItem('currentUser', JSON.stringify({ username: user.username, role: user.role }));
                    window.location.href = 'admin.html';
                } else {
                    errorDiv.textContent = 'Invalid username/password or inactive account.';
                    errorDiv.classList.remove('hidden');
                }
            });

            // Hide error on input
            document.getElementById('username').addEventListener('input', () => errorDiv.classList.add('hidden'));
            document.getElementById('password').addEventListener('input', () => errorDiv.classList.add('hidden'));
        })();
    </script>
</body>
</html>
