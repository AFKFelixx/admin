<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login · Municipality of Tobias Fornier</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase client library (must be loaded before inline script) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @layer base { * { font-family: 'Inter', system-ui, sans-serif; } }
        body.dark-mode { background-color: #0b1120; color: #e2e8f0; }
        body.dark-mode .bg-white { background-color: #1e293b !important; border-color: #334155; color: #f1f5f9; }
        body.dark-mode input { background-color: #334155; border-color: #475569; color: white; }
        body.dark-mode input::placeholder { color: #94a3b8; }
        body.dark-mode .text-gray-600 { color: #cbd5e1; }
        .theme-toggle {
            background: transparent; border: none; cursor: pointer; font-size: 1.4rem;
            color: #2e5fa7; transition: transform 0.2s; position: absolute; top: 1rem; right: 1rem;
        }
        .theme-toggle:hover { transform: scale(1.1); color: #1d3a6d; }
        body.dark-mode .theme-toggle { color: #fbbf24; }
        .error-message { color: #b91c1c; font-size: 0.875rem; margin-top: 0.5rem; text-align: center; }
        body.dark-mode .error-message { color: #f87171; }
        .spinner { border: 2px solid #f3f3f3; border-top: 2px solid #2e5fa7; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn-loading { opacity: 0.7; cursor: not-allowed; }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">
    <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">
        <i class="fas fa-sun" id="themeIcon"></i>
    </button>

    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8 relative border border-gray-200/60">
        <div class="flex flex-col items-center mb-8">
            <img id="loginLogo" src="https://via.placeholder.com/80x80?text=LGU" alt="Municipality logo" class="h-20 w-20 object-contain mb-3">
            <h1 class="text-2xl font-bold text-[#2e5fa7] text-center">Municipality of<br>Tobias Fornier</h1>
            <p class="text-sm text-gray-500 mt-1">Admin Portal</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username or Email</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400"><i class="fas fa-user"></i></span>
                    <input type="text" id="username" name="username" required placeholder="admin / editor" 
                           class="w-full pl-10 pr-3 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#2e5fa7] focus:border-transparent transition">
                </div>
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400"><i class="fas fa-lock"></i></span>
                    <input type="password" id="password" name="password" required placeholder="••••••••" 
                           class="w-full pl-10 pr-3 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#2e5fa7] focus:border-transparent transition">
                </div>
            </div>

            <button type="submit" id="loginButton"
                    class="w-full bg-[#2e5fa7] text-white py-3 rounded-xl font-semibold text-lg hover:bg-[#1d4a8b] transition shadow-lg shadow-[#2e5fa7]/20 flex items-center justify-center gap-2">
                <span>Sign in</span>
            </button>

            <div id="loginError" class="error-message hidden"></div>
        </form>

        <div class="mt-6 text-center text-sm text-gray-500">
            <a href="index.html" class="text-[#2e5fa7] hover:underline inline-flex items-center gap-1">
                <i class="fas fa-arrow-left"></i> Back to Home
            </a>
        </div>
    </div>

    <script>
        (function() {
            // ---------- Dark mode toggle (unchanged) ----------
            const themeToggle = document.getElementById('themeToggle');
            const themeIcon = document.getElementById('themeIcon');
            const body = document.body;
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                body.classList.add('dark-mode');
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
            } else {
                themeIcon.classList.add('fa-sun');
            }
            themeToggle.addEventListener('click', () => {
                body.classList.toggle('dark-mode');
                if (body.classList.contains('dark-mode')) {
                    themeIcon.classList.remove('fa-sun');
                    themeIcon.classList.add('fa-moon');
                    localStorage.setItem('theme', 'dark');
                } else {
                    themeIcon.classList.remove('fa-moon');
                    themeIcon.classList.add('fa-sun');
                    localStorage.setItem('theme', 'light');
                }
            });

            // ---------- Supabase client initialization ----------
            const supabaseUrl = 'https://ormkzcbrhvpwruadvzua.supabase.co';
            const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ybWt6Y2JyaHZwd3J1YWR2enVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NDUyMjMsImV4cCI6MjA4OTQyMTIyM30.mEXwx3O_JYmznGEmvEFTL3n5Jt1D9xqOXC4eHPoysp0';
            
            // Check if the Supabase library loaded correctly
            if (typeof window.supabase === 'undefined' || !window.supabase.createClient) {
                console.error('Supabase library not loaded correctly.');
                document.getElementById('loginError').textContent = 'System error: Supabase client not available.';
                document.getElementById('loginError').classList.remove('hidden');
                return;
            }
            
            const supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

            // ---------- Load logo from site_settings ----------
            const logoImg = document.getElementById('loginLogo');
            async function loadLogo() {
                try {
                    const { data, error } = await supabase
                        .from('site_settings')
                        .select('logo_url')
                        .eq('id', 1)
                        .single();
                    if (!error && data?.logo_url) {
                        logoImg.src = data.logo_url;
                    } else {
                        // Fallback to localStorage (if any)
                        const saved = localStorage.getItem('tobiasFornierCMS');
                        if (saved) {
                            const data = JSON.parse(saved);
                            if (data.site && data.site.logo) logoImg.src = data.site.logo;
                        }
                    }
                } catch (e) {
                    console.warn('Could not load logo from Supabase', e);
                }
            }
            loadLogo();

            // ---------- Login form submission ----------
            const loginForm = document.getElementById('loginForm');
            const errorDiv = document.getElementById('loginError');
            const loginButton = document.getElementById('loginButton');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');

            usernameInput.addEventListener('input', () => errorDiv.classList.add('hidden'));
            passwordInput.addEventListener('input', () => errorDiv.classList.add('hidden'));

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                const username = usernameInput.value.trim();
                const password = passwordInput.value.trim();

                if (!username || !password) {
                    errorDiv.textContent = 'Please enter both username and password.';
                    errorDiv.classList.remove('hidden');
                    return;
                }

                // Show loading state
                loginButton.disabled = true;
                loginButton.innerHTML = '<span class="spinner"></span> Signing in...';
                loginButton.classList.add('btn-loading');
                errorDiv.classList.add('hidden');

                try {
                    const { data, error } = await supabase
                        .from('users')
                        .select('*')
                        .or(`username.eq.${username},email.eq.${username}`)
                        .eq('password', password) // ⚠️ Plain text – replace with hash in production
                        .eq('status', 'Active')
                        .single();

                    if (error || !data) {
                        throw new Error('Invalid username/password or inactive account.');
                    }

                    // Success – set session
                    sessionStorage.setItem('loggedIn', 'true');
                    sessionStorage.setItem('currentUser', JSON.stringify({
                        id: data.id,
                        username: data.username,
                        role: data.role
                    }));

                    window.location.href = 'admin.html';
                } catch (err) {
                    errorDiv.textContent = err.message;
                    errorDiv.classList.remove('hidden');
                } finally {
                    loginButton.disabled = false;
                    loginButton.innerHTML = 'Sign in';
                    loginButton.classList.remove('btn-loading');
                }
            });
        })();
    </script>
</body>
</html>
